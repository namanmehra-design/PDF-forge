<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDFForge - Every PDF Tool, Free Forever</title>
<meta name="description" content="Free online PDF tools. Merge, split, compress, convert, edit, sign, watermark PDFs. All processing happens in your browser.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='3' y='2' width='20' height='26' rx='3' fill='%233b82f6' opacity='.7'/><rect x='9' y='4' width='20' height='26' rx='3' fill='%233b82f6'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<header>
  <a class="logo" onclick="PF.goHome()">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8Z"/><path d="M14 2v6h6"/>
      </svg>
    </div>
    <b>PDF</b>Forge
  </a>
  <nav class="header-nav">
    <button data-f="all" class="on" onclick="PF.filter('all')">All Tools</button>
    <button data-f="organize" onclick="PF.filter('organize')">Organize</button>
    <button data-f="convert" onclick="PF.filter('convert')">Convert</button>
    <button data-f="edit" onclick="PF.filter('edit')">Edit</button>
    <button data-f="security" onclick="PF.filter('security')">Security</button>
  </nav>
  <div class="header-right">
    <button class="auth-btn" id="authBtn" onclick="PF.toggleAuth()" style="display:none">Sign In</button>
  </div>
</header>

<!-- HOME -->
<div id="homeView">
  <section class="hero">
    <h1>Every PDF tool you need,<br><em>100% free.</em></h1>
    <p class="sub">Merge, split, compress, convert, edit, sign, and transform your PDFs. Everything runs privately in your browser. No uploads, no servers.</p>
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search tools... (merge, compress, convert)" oninput="PF.search(this.value)">
    </div>
  </section>

  <div class="filters" id="filterBar"></div>
  <div class="grid" id="toolGrid"></div>
</div>

<!-- WORKSPACE -->
<div class="workspace" id="workspace">
  <div class="ws-head">
    <button class="ws-back" onclick="PF.goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div>
      <h2 id="wsTitle"></h2>
      <p id="wsDesc"></p>
    </div>
  </div>
  <div id="wsBody"></div>
</div>

<div class="toast" id="toast"></div>

<footer>
  PDFForge &mdash; Free online PDF tools. All processing runs locally in your browser. Your files never leave your device.
</footer>

<script src="js/app.js"></script>
<script src="js/tools.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
